services:
  postgres:
    image: postgres:16-alpine
    container_name: codexia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codexia
      POSTGRES_USER: codexia
      POSTGRES_PASSWORD: codexia
    ports:
      - "54329:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codexia -d codexia"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    profiles: ["tools"]
    restart: unless-stopped
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
